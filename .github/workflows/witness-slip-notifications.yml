name: IL Witness Slip Notifications - Urbanist Topics

on:
  repository_dispatch:
    types: [il-data-updated]

  # Temporary: fires on push to this branch so the workflow is testable
  # before merging to main. Remove before merging.
  push:
    branches: [il-witness-slip-poc]

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (no emails sent)'
        required: false
        default: 'false'

  schedule:
    - cron: '0 9 * * 1-5'

jobs:
  notify-witness-slips:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml python-dateutil

      # ─────────────────────────────────────────────────────────────────
      # STEP 1 — Run the govbot pipeline (clone → tag → RSS feed)
      #
      # This is the whole point of the branch: use govbot itself to pull IL
      # legislation, apply the urbanist tag definitions from govbot.yml, and
      # emit a tagged RSS feed that the notifier can consume. No custom
      # scraping or keyword matching happens here — that’s govbot’s job.
      # ─────────────────────────────────────────────────────────────────
      - name: Download govbot binary
        run: |
          mkdir -p .govbot/bin
          curl -fsSL "https://github.com/chihacknight/govbot/releases/download/nightly/govbot-linux-x86_64" \
            -o .govbot/bin/govbot
          chmod +x .govbot/bin/govbot
          echo ".govbot/bin" >> $GITHUB_PATH

      # Cache key includes today's date so the cache is busted once per day.
      # Within the same day, re-runs reuse the cache and skip the slow clone.
      - name: Get today's date for cache key
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore repo cache
        id: cache-repos
        uses: actions/cache@v4
        with:
          path: .govbot/repos
          key: govbot-il-v3-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: govbot-il-v3-${{ runner.os }}-

      - name: Clone or update IL legislation repo
        run: |
          if [ -d ".govbot/repos/il-legislation" ]; then
            echo "📂 Repo exists, pulling latest..."
            cd .govbot/repos/il-legislation && git pull --ff-only
          else
            echo "📥 Fresh clone..."
            govbot clone il --govbot-dir .govbot
          fi

      - name: Save repo cache
        if: steps.cache-repos.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: .govbot/repos
          key: govbot-il-v3-${{ runner.os }}-${{ steps.date.outputs.date }}

      - name: Inspect IL legislation repo
        run: |
          BASE=.govbot/repos/il-legislation/country:us/state:il/sessions/104th/bills
          echo "--- Total bills (metadata.json) ---"
          find $BASE -name 'metadata.json' | wc -l
          echo "--- Total log event files ---"
          find $BASE -path '*/logs/*.json' | wc -l
          echo "--- Sample log files under HB2270 ---"
          ls $BASE/HB2270/logs/ 2>/dev/null | head -10 || echo "No logs dir"
          echo "--- HB2270 metadata ---"
          cat $BASE/HB2270/metadata.json 2>/dev/null | python3 -m json.tool --no-indent 2>/dev/null | head -30
          echo "--- Bills WITH log entries (first 20) ---"
          find $BASE -path '*/logs/*.json' -printf '%h\n' | sort -u \
            | sed "s|$BASE/||;s|/logs||" | head -20
          echo "--- Most recent log files across all bills ---"
          find $BASE -path '*/logs/*.json' -printf '%T@ %p\n' \
            | sort -rn | head -10 | awk '{print $2}'

      - name: Tag bills
        run: |
          echo "🏷️  Tagging bills..."
          echo "--- Raw log line count from govbot logs ---"
          govbot logs --repos il --govbot-dir .govbot | wc -l
          echo "--- First 5 log lines (raw) ---"
          govbot logs --repos il --govbot-dir .govbot | head -5
          echo "--- Running tag pipeline ---"
          govbot logs --repos il --govbot-dir .govbot \
            | govbot tag --output-dir . --govbot-dir .govbot
          echo "--- Tagged files produced ---"
          ls -la *.json 2>/dev/null | head -20 || echo "No JSON tag files"
          echo "--- Tag file count ---"
          ls *.json 2>/dev/null | wc -l

      - name: Build RSS feed
        id: govbot
        run: |
          mkdir -p docs
          govbot build \
            --output-dir docs \
            --output-file il-urbanist-feed.xml \
            --govbot-dir .govbot
          echo "feed-path=${{ github.workspace }}/docs/il-urbanist-feed.xml" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────────────
      # STEP 2 — Scan the tagged RSS feed for bills with upcoming committee
      #          hearings that have witness slips available, then build the
      #          activist email digest.
      # ─────────────────────────────────────────────────────────────────
      - name: Debug feed output
        run: |
          echo "--- Feed item count ---"
          grep -c '<item>' docs/il-urbanist-feed.xml 2>/dev/null || echo "Feed not found"
          echo "--- All GUIDs in feed ---"
          grep '<guid>' docs/il-urbanist-feed.xml | sed 's/.*<guid>//;s/<\/guid>.*//' | head -30 || echo "No GUIDs"
          echo "--- All titles in feed ---"
          grep '<title>' docs/il-urbanist-feed.xml | grep -v 'Illinois Urbanist' | head -30 || echo "No titles"

      - name: Generate witness slip notifications
        env:
          # Path to the RSS feed govbot just produced
          FEED_PATH: ${{ steps.govbot.outputs.feed-path }}

          # ── User identity for any pre-filled witness slip forms ───────────
          USER_NAME: ${{ secrets.WITNESS_SLIP_USER_NAME }}
          USER_EMAIL: ${{ secrets.WITNESS_SLIP_USER_EMAIL }}
          USER_ORG: ${{ secrets.WITNESS_SLIP_ORG }}

          # ── Per-tag recipient lists (comma-separated email addresses) ────
          # Each secret is optional; omit a tag’s secret to skip that list.
          RECIPIENTS_HOUSING: ${{ secrets.RECIPIENTS_HOUSING }}
          RECIPIENTS_TRANSIT: ${{ secrets.RECIPIENTS_TRANSIT }}
          RECIPIENTS_BIKING: ${{ secrets.RECIPIENTS_BIKING }}
          RECIPIENTS_SAFE_STREETS: ${{ secrets.RECIPIENTS_SAFE_STREETS }}
          RECIPIENTS_TRANSPORTATION: ${{ secrets.RECIPIENTS_TRANSPORTATION }}
          # Always receives the full combined digest
          RECIPIENTS_ALL: ${{ secrets.RECIPIENTS_ALL }}

          # ── Optional tuning ──────────────────────────────────────────
          TRACKED_BILLS: ${{ secrets.TRACKED_BILLS }}
          URGENCY_THRESHOLD_DAYS: ${{ secrets.URGENCY_THRESHOLD_DAYS }}
        run: |
          python scripts/witness_slip_notifier.py \
            --mode github-action \
            --feed docs/il-urbanist-feed.xml
      
      - name: Send email notifications
        if: |
          github.event.inputs.test_mode != 'true' &&
          env.MAIL_SERVER != ''
        env:
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Govbot] 🚲🚇🏘️ IL Urbanist Bills - Witness Slip Action Needed"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: ${{ secrets.MAIL_FROM }}
          body: file://notifications_output.txt
          html_body: file://notifications_output.html
          attachments: witness_slip_notifications.json
      
      - name: Post summary
        if: always()
        run: |
          echo "## 📊 Witness Slip Notification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f witness_slip_notifications.json ]; then
            BILL_COUNT=$(jq '. | length' witness_slip_notifications.json)
            echo "**Bills Processed:** $BILL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$BILL_COUNT" -gt 0 ]; then
              echo "### 🚲🚇🏘️🚶 Urbanist Bills Requiring Action:" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | "- **\(.bill_number)** [\(.category)]: \(.title)"' witness_slip_notifications.json >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No bills requiring action." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: witness-slip-notifications-${{ github.run_number }}
          path: |
            witness_slip_notifications.json
            notifications_output.txt
            notifications_output.html
          retention-days: 30
