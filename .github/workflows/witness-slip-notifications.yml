name: IL Witness Slip Notifications - Urbanist Topics

on:
  repository_dispatch:
    types: [il-data-updated]

  # Temporary: fires on push to this branch so the workflow is testable
  # before merging to main. Remove before merging.
  push:
    branches: [il-witness-slip-poc]

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (no emails sent)'
        required: false
        default: 'false'

  schedule:
    - cron: '0 9 * * 1-5'

jobs:
  notify-witness-slips:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml python-dateutil

      # ─────────────────────────────────────────────────────────────────
      # STEP 1 — Run the govbot pipeline (clone → tag → RSS feed)
      #
      # This is the whole point of the branch: use govbot itself to pull IL
      # legislation, apply the urbanist tag definitions from govbot.yml, and
      # emit a tagged RSS feed that the notifier can consume. No custom
      # scraping or keyword matching happens here — that’s govbot’s job.
      # ─────────────────────────────────────────────────────────────────
      - name: Run govbot (clone → tag → RSS)
        id: govbot
        uses: chihacknight/govbot@main
        with:
          # Filter the feed to only the five urbanist tags defined in govbot.yml
          tags: Housing,Transit,Biking,Safe Streets,Transportation
          output-dir: docs
          output-file: il-urbanist-feed.xml

      # ─────────────────────────────────────────────────────────────────
      # STEP 2 — Scan the tagged RSS feed for bills with upcoming committee
      #          hearings that have witness slips available, then build the
      #          activist email digest.
      # ─────────────────────────────────────────────────────────────────
      - name: Generate witness slip notifications
        env:
          # Path to the RSS feed govbot just produced
          FEED_PATH: ${{ steps.govbot.outputs.feed-path }}

          # ── User identity for any pre-filled witness slip forms ───────────
          USER_NAME: ${{ secrets.WITNESS_SLIP_USER_NAME }}
          USER_EMAIL: ${{ secrets.WITNESS_SLIP_USER_EMAIL }}
          USER_ORG: ${{ secrets.WITNESS_SLIP_ORG }}

          # ── Per-tag recipient lists (comma-separated email addresses) ────
          # Each secret is optional; omit a tag’s secret to skip that list.
          RECIPIENTS_HOUSING: ${{ secrets.RECIPIENTS_HOUSING }}
          RECIPIENTS_TRANSIT: ${{ secrets.RECIPIENTS_TRANSIT }}
          RECIPIENTS_BIKING: ${{ secrets.RECIPIENTS_BIKING }}
          RECIPIENTS_SAFE_STREETS: ${{ secrets.RECIPIENTS_SAFE_STREETS }}
          RECIPIENTS_TRANSPORTATION: ${{ secrets.RECIPIENTS_TRANSPORTATION }}
          # Always receives the full combined digest
          RECIPIENTS_ALL: ${{ secrets.RECIPIENTS_ALL }}

          # ── Optional tuning ──────────────────────────────────────────
          TRACKED_BILLS: ${{ secrets.TRACKED_BILLS }}
          URGENCY_THRESHOLD_DAYS: ${{ secrets.URGENCY_THRESHOLD_DAYS }}
        run: |
          python scripts/witness_slip_notifier.py \
            --mode github-action \
            --feed docs/il-urbanist-feed.xml
      
      - name: Send email notifications
        if: github.event.inputs.test_mode != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Govbot] 🚲🚇🏘️ IL Urbanist Bills - Witness Slip Action Needed"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: ${{ secrets.MAIL_FROM }}
          body: file://notifications_output.txt
          html_body: file://notifications_output.html
          attachments: witness_slip_notifications.json
      
      - name: Post summary
        if: always()
        run: |
          echo "## 📊 Witness Slip Notification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f witness_slip_notifications.json ]; then
            BILL_COUNT=$(jq '. | length' witness_slip_notifications.json)
            echo "**Bills Processed:** $BILL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$BILL_COUNT" -gt 0 ]; then
              echo "### 🚲🚇🏘️🚶 Urbanist Bills Requiring Action:" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | "- **\(.bill_number)** [\(.category)]: \(.title)"' witness_slip_notifications.json >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No bills requiring action." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: witness-slip-notifications-${{ github.run_number }}
          path: |
            witness_slip_notifications.json
            notifications_output.txt
            notifications_output.html
          retention-days: 30
