# govbot.yml — IL Urbanist Witness Slip POC
# This file drives the govbot clone → tag → RSS pipeline.
# See: https://github.com/chihacknight/govbot

# ── Repos ─────────────────────────────────────────────────────────────────────
# Tells `govbot clone` which OpenStates data repo(s) to pull.
# Use locale codes (il, ca, usa, etc.). Without this key govbot clones all 51.
repos:
  - il

# ── Urbanist Tags ─────────────────────────────────────────────────────────────
# govbot logs | govbot tag  applies these against each bill's title, subject
# array, and abstract. Bills can match multiple tags.
# Schema: name (required), description, include_keywords, exclude_keywords,
#         examples, negative_examples, threshold (0.0–1.0, default 0.5)
tags:
  - name: Housing
    description: Bills related to housing, zoning, affordability, and development
    include_keywords:
      - housing
      - affordable housing
      - real estate
      - zoning
      - land use
      - development
      - rent
      - eviction
      - ADU
      - accessory dwelling
      - upzoning
      - transit-oriented development
      - TOD
      - mixed-use
      - landlord
      - tenant
      - homelessness
      - shelter
    exclude_keywords:
      - animal shelter

  - name: Transit
    description: Bills related to public transportation including buses, trains, and rail
    include_keywords:
      - transit
      - bus
      - rail
      - CTA
      - Metra
      - Pace
      - RTA
      - light rail
      - commuter rail
      - subway
      - public transportation
      - GTFS
      - BRT
      - bus rapid transit
      - train
      - fare
      - ridership
    exclude_keywords:
      - school bus

  - name: Biking
    description: Bills related to cycling infrastructure, bike lanes, and micromobility
    include_keywords:
      - bicycle
      - biking
      - bike lane
      - bike path
      - bike share
      - Divvy
      - cycling
      - cyclist
      - micromobility
      - e-bike
      - electric bike
      - bike infrastructure
      - bike parking
    exclude_keywords: []

  - name: Safe Streets
    description: Bills related to pedestrian safety, traffic calming, and Vision Zero
    include_keywords:
      - pedestrian
      - safe streets
      - Vision Zero
      - complete streets
      - traffic safety
      - crosswalk
      - sidewalk
      - speed limit
      - road safety
      - traffic calming
      - school zone
      - distracted driving
      - hit and run
      - fatality
      - speeding
    exclude_keywords: []

  - name: Transportation
    description: Broader transportation bills including roads, highways, and infrastructure
    include_keywords:
      - transportation
      - highway
      - road
      - infrastructure
      - IDOT
      - motor vehicle
      - parking
      - tollway
      - expressway
      - bridge
      - traffic
      - congestion
    exclude_keywords: []

# ── RSS Feed Output ───────────────────────────────────────────────────────────
# govbot build writes the tagged feed here; witness_slip_notifier.py reads it.
build:
  output_dir: docs
  output_file: il-urbanist-feed.xml
  title: "Illinois Urbanist Bills — Govbot Feed"
  description: "IL legislative bills tagged for urbanist advocacy: Housing, Transit, Biking, Safe Streets, Transportation"
  link: https://chihacknight.github.io/govbot/il-urbanist-feed.xml
