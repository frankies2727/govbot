# govbot.yml — IL Urbanist Witness Slip POC
# This file drives the govbot clone → tag → RSS pipeline.
# See: https://github.com/chihacknight/govbot

# ── Repos ─────────────────────────────────────────────────────────────────────
repos:
  - il

# ── Urbanist Tags ─────────────────────────────────────────────────────────────
# tags is a MAP keyed by tag name (govbot expects this format, not a list).
#
# threshold: controls how confident govbot must be before tagging a bill.
#   Default is 0.5. Higher values (0.7–0.85) prevent false positives like
#   "TRANSPORTATION-TECH" (a boat registration amendment) matching everything.
#   Start conservative; loosen if real bills are being missed.
#
# include_keywords are matched against title, subjects, and abstract.
# They must be specific enough to avoid cross-contamination.
tags:
  Housing:
    description: Bills related to housing supply, zoning reform, affordability, and residential development
    threshold: 0.72
    include_keywords:
      - housing
      - affordable housing
      - accessory dwelling unit
      - ADU
      - zoning
      - upzoning
      - mixed-use
      - multifamily
      - transit-oriented development
      - adaptive reuse
      - parking reform
      - impact fee
      - building permit
      - single stair
      - faith-based housing
      - YIGBY
      - residential development
      - missing middle
      - rent
      - eviction
      - landlord
      - tenant
      - homelessness
    exclude_keywords:
      - animal shelter
      - tax increment

  Transit:
    description: Bills related to public transportation—buses, trains, rail, and fare policy
    threshold: 0.75
    include_keywords:
      - public transit
      - bus rapid transit
      - BRT
      - transit signal priority
      - green light for buses
      - CTA
      - Metra
      - Pace
      - RTA
      - commuter rail
      - light rail
      - transit fare
      - transit funding
      - transit-oriented
    exclude_keywords:
      - school bus
      - prison
      - corrections

  Biking:
    description: Bills related to cycling infrastructure, bike safety, and micromobility
    threshold: 0.75
    include_keywords:
      - bicycle
      - bike lane
      - bike path
      - bike grid
      - cycling
      - cyclist
      - Idaho stop
      - e-bike
      - electric bike
      - bikeshare
      - Divvy
      - micromobility
      - bicycle safety
      - bike parking
    exclude_keywords: []

  Safe Streets:
    description: Bills related to pedestrian safety, speed limits, traffic calming, and Vision Zero
    threshold: 0.75
    include_keywords:
      - pedestrian safety
      - safe streets
      - Vision Zero
      - complete streets
      - speed camera
      - speed limit
      - urban speed limit
      - traffic calming
      - school zone
      - crosswalk
      - sidewalk
      - distracted driving
      - DUI
      - BAC threshold
      - hit and run
      - quick build
      - safety infrastructure
    exclude_keywords: []

  Transportation:
    description: Broader transportation infrastructure bills—roads, highways, IDOT policy
    threshold: 0.78
    include_keywords:
      - IDOT
      - Illinois Department of Transportation
      - highway safety
      - road diet
      - complete streets
      - transportation funding
      - infrastructure
    exclude_keywords:
      - boat
      - watercraft
      - vessel
      - aviation
      - airport
      - railroad

# ── RSS Feed Output ───────────────────────────────────────────────────────────
build:
  output_dir: docs
  output_file: il-urbanist-feed.xml
  title: "Illinois Urbanist Bills — Govbot Feed"
  description: "IL legislative bills tagged for urbanist advocacy: Housing, Transit, Biking, Safe Streets, Transportation"
  link: https://chihacknight.github.io/govbot/il-urbanist-feed.xml
